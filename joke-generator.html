<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            padding: 20px;
        }
        
        .joke-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .joke-text {
            font-size: 18px;
            color: #333;
            margin: 30px 0;
            min-height: 60px;
            line-height: 1.6;
            font-weight: 500;
        }
        
        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #667eea;
            margin: 0 3px;
            animation: loading 1.4s infinite;
        }
        
        .loading:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .loading:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes loading {
            0%, 60%, 100% {
                opacity: 0.3;
            }
            30% {
                opacity: 1;
            }
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .joke-type {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #c33;
        }
        
        .success-animation {
            animation: bounce 0.6s ease;
        }
        
        @keyframes bounce {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 32px;
            color: #333;
            margin: 0;
        }
        
        .header p {
            color: #999;
            margin: 5px 0 0 0;
        }
    </style>
</head>
<body>
    <div class="joke-container">
        <div class="header">
            <h1>😂 Joke Generator</h1>
            <p>Get random jokes instantly!</p>
        </div>
        
        <div id="jokeFetching" style="display: none; text-align: center; margin: 30px 0;">
            <div class="loading"></div>
            <div class="loading"></div>
            <div class="loading"></div>
            <p style="color: #999; margin-top: 15px;">Loading a funny joke...</p>
        </div>
        
        <div id="jokeContent" style="display: none;">
            <div id="jokeText" class="joke-text"></div>
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            <div class="joke-type">
                Type: <span id="jokeType">General</span>
            </div>
        </div>
        
        <div class="button-group">
            <button class="btn-primary" onclick="getJoke()">
                <i class="fas fa-laugh"></i> Get Joke
            </button>
            <button class="btn-secondary" onclick="copyToClipboard()">
                <i class="fas fa-copy"></i> Copy
            </button>
        </div>
        
        <div style="text-align: center; margin-top: 20px; font-size: 12px; color: #999;">
            Powered by JokeAPI
        </div>
    </div>

    <script>
        let currentJoke = '';
        
        // Fetch joke from API
        async function getJoke() {
            const jokeFetching = document.getElementById('jokeFetching');
            const jokeContent = document.getElementById('jokeContent');
            
            jokeFetching.style.display = 'block';
            jokeContent.style.display = 'none';
            
            try {
                // Using JokeAPI - https://jokeapi.dev
                const response = await fetch('https://v2.jokeapi.dev/joke/Any');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }
                
                const data = await response.json();
                
                // Handle different joke formats
                if (data.type === 'single') {
                    currentJoke = data.joke;
                } else if (data.type === 'twopart') {
                    currentJoke = `${data.setup}\n\n${data.delivery}`;
                }
                
                // Display the joke
                displayJoke(data);
                
            } catch (error) {
                showError('Oops! Could not load a joke. Please try again.');
                console.error('Error:', error);
            } finally {
                jokeFetching.style.display = 'none';
            }
        }
        
        // Display joke on the page
        function displayJoke(data) {
            const jokeContent = document.getElementById('jokeContent');
            const jokeText = document.getElementById('jokeText');
            const jokeType = document.getElementById('jokeType');
            const errorMessage = document.getElementById('errorMessage');
            
            jokeText.textContent = currentJoke;
            jokeType.textContent = data.category || 'General';
            errorMessage.style.display = 'none';
            jokeContent.style.display = 'block';
            
            // Add animation
            jokeText.classList.remove('success-animation');
            void jokeText.offsetWidth; // Trigger reflow
            jokeText.classList.add('success-animation');
        }
        
        // Show error message
        function showError(message) {
            const jokeContent = document.getElementById('jokeContent');
            const errorMessage = document.getElementById('errorMessage');
            
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            jokeContent.style.display = 'block';
            currentJoke = '';
        }
        
        // Copy joke to clipboard
        function copyToClipboard() {
            if (!currentJoke) {
                alert('No joke to copy! Get a joke first.');
                return;
            }
            
            navigator.clipboard.writeText(currentJoke).then(() => {
                alert('Joke copied to clipboard! 📋');
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }
        
        // Load initial joke on page load
        window.addEventListener('load', () => {
            getJoke();
        });
    </script>
</body>
</html>
